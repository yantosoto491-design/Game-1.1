<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>JUNGLE FPS · A-Frame</title>
    <style>
        body, html {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background-color: #0a0f0a;
        }
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            border: 1px solid black;
            pointer-events: none;
            z-index: 20;
        }
        /* Health bar */
        #health-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 240px;
            height: 20px;
            background: rgba(20,20,20,0.7);
            border: 2px solid #3a2a1a;
            border-radius: 12px;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #c0392b, #e74c3c);
            border-radius: 10px;
            transition: width 0.1s;
        }
        #health-text {
            position: absolute;
            top: -22px;
            left: 10px;
            color: #eee;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        /* Score */
        #score-container {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(10,20,5,0.7);
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid #6a8c4a;
            color: #f0f7d0;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 3px 3px 0 #1a2a0e;
            backdrop-filter: blur(2px);
            pointer-events: none;
            z-index: 15;
        }
        /* Radar / Minimap */
        #radar-container {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 160px;
            height: 160px;
            background: rgba(10,20,5,0.6);
            border: 3px solid #5a7a3a;
            border-radius: 20px;
            backdrop-filter: blur(3px);
            pointer-events: none;
            z-index: 15;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #radar-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #radar-label {
            position: absolute;
            bottom: -18px;
            left: 10px;
            color: #b3d99e;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 0 black;
        }
        /* Damage vignette */
        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(180,0,0,0.5) 100%);
            opacity: 0;
            transition: opacity 0.1s;
            pointer-events: none;
            z-index: 25;
            border: inset 8px rgba(200,0,0,0.2);
        }
        /* Start / Game Over screens */
        .fullscreen-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 20, 5, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 40;
            pointer-events: auto;
            color: #e3f0d5;
            text-shadow: 4px 4px 0 #1a2a0a;
            font-family: 'Courier New', monospace;
        }
        .panel-box {
            background: #1f3a12cc;
            padding: 30px 50px;
            border-radius: 40px;
            border: 3px solid #9bbb7a;
            text-align: center;
            box-shadow: 0 20px 30px #00000080;
        }
        h1 {
            font-size: 56px;
            margin: 0 0 20px;
            letter-spacing: 6px;
        }
        .difficulty-btn {
            background: #2c4d1e;
            border: 3px solid #b1d18a;
            color: #f5ffe0;
            font-size: 28px;
            font-weight: bold;
            padding: 14px 30px;
            margin: 10px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #142008;
            transition: 0.07s;
            text-shadow: 2px 2px 0 #1a2a0a;
            pointer-events: auto;
        }
        .difficulty-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #142008;
        }
        .restart-btn {
            background: #a33c2e;
            border-color: #f5b7a5;
            font-size: 32px;
            padding: 18px 40px;
        }
        #mobile-joystick-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #cccccc;
            font-size: 14px;
            background: #00000060;
            padding: 6px 15px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 35;
        }
        /* Joystick area (for nipple) */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 140px;
            height: 140px;
            background: rgba(30,40,20,0.3);
            border-radius: 999px;
            border: 2px dashed #7fa06b;
            pointer-events: auto;
            z-index: 30;
            backdrop-filter: blur(2px);
            touch-action: none;
        }
        /* Hide on desktop if not needed, but we show it as optional mobile control */
        @media (pointer: fine) {
            #joystick-zone {
                opacity: 0.5;
            }
        }
    </style>
    <!-- A-Frame & components -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <!-- nipplejs for mobile joystick -->
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>
</head>
<body>

<!-- UI Overlays -->
<div id="game-ui">
    <div id="crosshair"></div>
    
    <div id="health-container">
        <div id="health-text">❤️ HEALTH</div>
        <div id="health-fill" style="width:100%"></div>
    </div>
    
    <div id="score-container">🏆 <span id="score-value">0</span></div>
    
    <div id="radar-container">
        <canvas id="radar-canvas" width="160" height="160"></canvas>
        <div id="radar-label">📡 RADAR</div>
    </div>
    
    <div id="damage-overlay"></div>
    <div id="mobile-joystick-note">🕹️ Drag left zone to move (mobile) · WASD on PC</div>
</div>

<!-- Joystick touch area -->
<div id="joystick-zone"></div>

<!-- Start Screen -->
<div id="start-screen" class="fullscreen-panel">
    <div class="panel-box">
        <h1>🌴 JUNGLE OPS</h1>
        <p style="font-size:22px; margin-bottom:25px;">SELECT DIFFICULTY</p>
        <div>
            <button class="difficulty-btn" data-diff="easy">🌱 EASY</button>
            <button class="difficulty-btn" data-diff="normal">🍂 NORMAL</button>
            <button class="difficulty-btn" data-diff="hard">🔥 HARD</button>
        </div>
        <p style="margin-top:30px; font-size:16px;">WASD move · Mouse look · Click to shoot</p>
    </div>
</div>

<!-- Game Over Screen (hidden) -->
<div id="gameover-screen" class="fullscreen-panel" style="display: none;">
    <div class="panel-box">
        <h1>💀 GAME OVER</h1>
        <p style="font-size:36px; margin:10px;">SCORE: <span id="final-score">0</span></p>
        <button class="difficulty-btn restart-btn" id="restart-btn">⟳ PLAY AGAIN</button>
    </div>
</div>

<!-- A-Frame Scene -->
<a-scene id="main-scene" pointer-lock="true" renderer="antialias: true; physicallyCorrectLights: true; colorManagement: true;" fog="type: none;">

    <!-- Assets (no external images) -->
    
    <!-- Environment: Jungle with trees, grass, lighting -->
    <a-entity environment="preset: forest; ground: flat; groundYScale: 3; groundTexture: grass; grid: none; playArea: 1; shadow: true; trees: 0.6; grass: 0.8; grassDensity: 0.7; lighting: default; lightPosition: 10 20 5; skyType: gradient; skyColor: #7cb57c;"></a-entity>
    
    <!-- Extra lighting to remove fog effect -->
    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="5 15 10" intensity="1.2" cast-shadow="true"></a-light>
    
    <!-- Procedural structures: Mountains, houses, crates -->
    <!-- Mountains (cones) -->
    <a-cone position="-12 0 -8" radius-bottom="6" radius-top="1.5" height="10" color="#5d6e4a" roughness="0.9"></a-cone>
    <a-cone position="14 0 12" radius-bottom="7" radius-top="2" height="12" color="#4a5c3a" roughness="0.9"></a-cone>
    <a-cone position="-5 0 18" radius-bottom="4" radius-top="0.8" height="7" color="#6b7e55"></a-cone>
    
    <!-- Simple house -->
    <a-entity position="8 0 -6">
        <a-box width="4" height="2.5" depth="4" color="#b5926a" position="0 1.25 0" roughness="0.8"></a-box>
        <a-pyramid radius="2.5" height="1.8" color="#8b3a3a" position="0 3.0 0"></a-pyramid>
        <a-box width="0.8" height="1.8" depth="0.1" color="#5d3a1a" position="0 0.9 2.01"></a-box>
    </a-entity>
    
    <!-- Second house -->
    <a-entity position="-10 0 10">
        <a-box width="3.5" height="2.2" depth="3.5" color="#c0a57b" position="0 1.1 0"></a-box>
        <a-pyramid radius="2.2" height="1.5" color="#6d4c3c" position="0 2.8 0"></a-pyramid>
    </a-entity>
    
    <!-- Crates for cover -->
    <a-box position="5 0.5 -3" width="1.5" height="1" depth="1.5" color="#8b6b4d" roughness="0.9"></a-box>
    <a-box position="5 1.5 -3" width="1.5" height="1" depth="1.5" color="#7a5d42"></a-box>
    <a-box position="-3 0.5 5" width="1.2" height="1" depth="1.2" color="#a77b52"></a-box>
    <a-box position="-6 0.5 -4" width="2" height="1.2" depth="1.5" color="#9e7a5a"></a-box>
    <a-box position="2 0.5 7" width="1.5" height="1.5" depth="1.5" color="#7b6248"></a-box>
    
    <!-- Player Rig (Camera + Gun) -->
    <a-entity id="player" position="0 1.6 0" movement-controls listener>
        <!-- Camera with look controls -->
        <a-entity id="camera-rig" camera look-controls="pointerLockEnabled: true; enableReverseMouse: false" position="0 0 0">
            <!-- Gun model attached to camera -->
            <a-entity id="gun-group" position="0.4 -0.3 -0.8" rotation="0 0 0">
                <!-- Gun body -->
                <a-box width="0.25" height="0.15" depth="0.7" color="#2c2c2c" position="0 0 -0.2"></a-box>
                <a-box width="0.12" height="0.1" depth="0.3" color="#3a3a3a" position="0 0.02 0.1"></a-box>
                <a-cylinder radius="0.04" height="0.4" color="#1a1a1a" position="0.1 -0.05 -0.4" rotation="0 0 0"></a-cylinder>
                <!-- Muzzle flash sphere (hidden) -->
                <a-sphere id="muzzle-flash" radius="0.12" color="#ffaa00" position="0 0 -0.65" visible="false" light="type: point; intensity: 0.8; distance: 5; decay: 2"></a-sphere>
            </a-entity>
        </a-entity>
    </a-entity>
    
    <!-- Enemy container (spawned dynamically) -->
    <a-entity id="enemy-container"></a-entity>
    
</a-scene>

<script>
    (function(){
        // ---------- GAME STATE ----------
        const game = {
            active: false,
            difficulty: 'normal',
            health: 100,
            maxHealth: 100,
            score: 0,
            enemies: [],
            damageCooldown: 0,
            enemySpawnTimer: 0,
            damagePerSecond: 10,
            difficultyMultiplier: 1.0,
            playerPos: new THREE.Vector3(),
        };
        
        const scene = document.querySelector('a-scene');
        const playerRig = document.getElementById('player');
        const cameraRig = document.getElementById('camera-rig');
        const enemyContainer = document.getElementById('enemy-container');
        const scoreSpan = document.getElementById('score-value');
        const healthFill = document.getElementById('health-fill');
        const damageOverlay = document.getElementById('damage-overlay');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const finalScoreSpan = document.getElementById('final-score');
        const radarCanvas = document.getElementById('radar-canvas');
        const ctx = radarCanvas.getContext('2d');
        
        // Gun recoil
        const gunGroup = document.getElementById('gun-group');
        const muzzleFlash = document.getElementById('muzzle-flash');
        let recoilAnim = false;
        
        // Mobile joystick
        let joystickActive = false;
        let moveVector = new THREE.Vector2(0,0);
        const joystickZone = document.getElementById('joystick-zone');
        
        // Key states
        const keys = { w:false, a:false, s:false, d:false };
        
        // ---------- DIFFICULTY ----------
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const diff = e.target.dataset.diff;
                game.difficulty = diff;
                if(diff === 'easy') game.difficultyMultiplier = 0.5;
                else if(diff === 'normal') game.difficultyMultiplier = 1.0;
                else game.difficultyMultiplier = 2.2;
                startGame();
            });
        });
        
        document.getElementById('restart-btn').addEventListener('click', ()=>{
            gameoverScreen.style.display = 'none';
            startScreen.style.display = 'flex';
            resetGame();
        });
        
        function startGame() {
            startScreen.style.display = 'none';
            gameoverScreen.style.display = 'none';
            resetGame();
            game.active = true;
            // Request pointer lock on canvas click
            scene.canvas.addEventListener('click', ()=>{
                if(scene.canvas.requestPointerLock && game.active) {
                    scene.canvas.requestPointerLock();
                }
            });
        }
        
        function resetGame() {
            game.health = game.maxHealth;
            game.score = 0;
            game.enemies.forEach(e => e.remove());
            game.enemies = [];
            updateUI();
            playerRig.setAttribute('position', '0 1.6 0');
            cameraRig.setAttribute('rotation', '0 0 0');
            game.damageCooldown = 0;
            damageOverlay.style.opacity = '0';
            game.active = true;
        }
        
        function gameOver() {
            game.active = false;
            finalScoreSpan.textContent = game.score;
            gameoverScreen.style.display = 'flex';
            document.exitPointerLock();
        }
        
        function updateUI() {
            scoreSpan.textContent = game.score;
            const percent = (game.health / game.maxHealth)*100;
            healthFill.style.width = Math.max(0, percent) + '%';
        }
        
        // Damage player
        function damagePlayer(amount) {
            if(!game.active) return;
            game.health = Math.max(0, game.health - amount);
            updateUI();
            // vignette
            damageOverlay.style.opacity = '0.7';
            setTimeout(()=> damageOverlay.style.opacity = '0', 120);
            if(game.health <= 0) gameOver();
        }
        
        // ---------- ENEMY SPAWN & AI ----------
        function spawnEnemy() {
            if(!game.active) return;
            const angle = Math.random() * Math.PI*2;
            const dist = 12 + Math.random()*10;
            const x = Math.cos(angle)*dist;
            const z = Math.sin(angle)*dist;
            
            const enemy = document.createElement('a-entity');
            enemy.setAttribute('class', 'enemy');
            enemy.setAttribute('geometry', 'primitive: sphere; radius: 0.7');
            enemy.setAttribute('material', 'color: #c0392b; emissive: #4a0000; roughness: 0.3');
            enemy.setAttribute('position', `${x} 0.7 ${z}`);
            // Add simple eyes
            const eyeL = document.createElement('a-sphere');
            eyeL.setAttribute('position', '-0.25 0.2 0.6');
            eyeL.setAttribute('radius', '0.12');
            eyeL.setAttribute('color', '#000');
            const eyeR = document.createElement('a-sphere');
            eyeR.setAttribute('position', '0.25 0.2 0.6');
            eyeR.setAttribute('radius', '0.12');
            eyeR.setAttribute('color', '#000');
            enemy.appendChild(eyeL);
            enemy.appendChild(eyeR);
            
            enemy.dataset.health = 30;
            enemy.dataset.speed = 0.03 + (Math.random()*0.02);
            
            enemyContainer.appendChild(enemy);
            game.enemies.push(enemy);
        }
        
        function updateEnemies(deltaTime) {
            if(!game.active) return;
            const playerPos = playerRig.object3D.position;
            const enemiesToRemove = [];
            
            game.enemies.forEach(enemy => {
                if(!enemy.parentNode) return;
                const ePos = enemy.object3D.position;
                const dir = new THREE.Vector3().subVectors(playerPos, ePos).normalize();
                const speed = parseFloat(enemy.dataset.speed) * deltaTime * 40; 
                ePos.x += dir.x * speed;
                ePos.z += dir.z * speed;
                // look at player
                enemy.object3D.lookAt(playerPos);
                
                // Damage player if close
                const dist = ePos.distanceTo(playerPos);
                if(dist < 2.2) {
                    if(game.damageCooldown <= 0) {
                        let dmg = game.damagePerSecond * game.difficultyMultiplier * (deltaTime || 0.1);
                        damagePlayer(dmg);
                        game.damageCooldown = 0.8;
                    }
                }
                
                // Remove if too far? no
            });
            
            if(game.damageCooldown > 0) game.damageCooldown -= deltaTime;
            
            // Spawn timer
            if(game.enemySpawnTimer <= 0 && game.enemies.length < 12) {
                spawnEnemy();
                game.enemySpawnTimer = 2.5;
            } else {
                game.enemySpawnTimer -= deltaTime;
            }
        }
        
        // ---------- SHOOTING ----------
        function shoot() {
            if(!game.active) return;
            // Recoil animation
            if(!recoilAnim) {
                recoilAnim = true;
                gunGroup.setAttribute('position', '0.4 -0.32 -0.75');
                setTimeout(()=> gunGroup.setAttribute('position', '0.4 -0.3 -0.8'), 60);
                setTimeout(()=> recoilAnim = false, 100);
            }
            // Muzzle flash
            muzzleFlash.setAttribute('visible', true);
            setTimeout(()=> muzzleFlash.setAttribute('visible', false), 50);
            
            // Raycast
            const camera = document.querySelector('[camera]').object3D;
            const direction = new THREE.Vector3(0,0,-1);
